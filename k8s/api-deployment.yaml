apiVersion: apps/v1
kind: Deployment
metadata:
  name: compagnon-immo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compagnon-immo-api
  template:
    metadata:
      labels:
        app: compagnon-immo-api
    spec:
      containers:
        - name: api
          image: compagnon-immo-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"

