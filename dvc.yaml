stages:
  prepare_streamlit_data:
    cmd: python app/prepare_streamlit_data.py
    deps:
      - app/prepare_streamlit_data.py
    outs:
      - data/processed/streamlit_data.parquet

  train_baseline:
    cmd: python src/pipeline/train_model.py
    deps:
      - src/pipeline/train_model.py
    params:
      - params.yaml:
          - xgboost.n_estimators
          - xgboost.max_depth
          - xgboost.learning_rate
    metrics:
      - metrics/scores.json:
          cache: false
    outs:
      - notebooks/Models/model_xgboost_single.pkl
